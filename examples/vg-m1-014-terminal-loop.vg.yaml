id: vg_m1_014_terminal_loop
version: "0.1.0"

inputs:
  task_scope:
    type: string
    default: "Complete only VG-M1-014: session-bound Terminal architecture for VineGraph M1. Do not implement other M1 backlog items."
  verification_command:
    type: string
    default: "npm run typecheck && npm test"
  acceptance_doc:
    type: string
    default: "docs/m1-terminal-completion.md"

runtime:
  max_fix_attempts: 16
  max_total_steps: 80
  workspace:
    mode: worktree

nodes:
  - id: implement_terminal_slice
    type: execute
    backend: codex
    promptTemplate: |
      You are implementing the next smallest VG-M1-014 Terminal slice.

      Scope:
      {{inputs.task_scope}}

      Previous terminal task decision, if any:
      {{nodes.task_gate.payload.next_task}}

      Source-of-truth files to inspect before editing:
      - docs/backlog.md
      - docs/progress.md
      - {{inputs.acceptance_doc}}
      - src/types.ts
      - src/scheduler.ts
      - src/execute-runner.ts
      - src/server.ts
      - src/ui/app.js
      - src/terminal-session.ts
      - src-tauri/
      - tests/

      VG-M1-014 acceptance slices:
      - terminal session ids connect node activations, run events, server actions, and UI terminal state
      - Codex terminal-mode prompts use reliable stdin and must not be typed through PTY keyboard input
      - Tauri desktop can support a Rust portable-pty session manager
      - UI can attach or reattach by sessionId and receive a bounded snapshot plus live output
      - terminal transcript is persisted or associated with run history
      - interrupt, kill, resize, completion, cancellation, and app cleanup have one session lifecycle model
      - browser/dev fallback remains explicit when Tauri portable-pty is unavailable

      Hard boundaries:
      - Do not work on VG-M1-002 through VG-M1-013 unless a tiny supporting change is strictly required for VG-M1-014.
      - Pick exactly one small, testable terminal slice per implementation pass.
      - Preserve existing tests and product behavior.
      - Add or update focused tests for any behavior change.
      - Run targeted verification, and run {{inputs.verification_command}} when practical.
      - Do not commit changes.

      Final response must end with:
      TASK_STATUS:
      task_summary: <one-sentence summary of the terminal slice completed>
      files_changed: <paths changed>
      tests_run: <commands and observed results>
      remaining_terminal_task_hint: <next VG-M1-014 slice, or none>
    execution:
      model: gpt-5.5
      reasoning_effort: high
      workspace_access: write
      timeout_ms: 1200000

  - id: verify_terminal_slice
    type: execute
    backend: claude
    promptTemplate: |
      Verify the latest VG-M1-014 terminal slice.

      Scope:
      {{inputs.task_scope}}

      Latest implementation output:
      {{nodes.implement_terminal_slice.stdout}}

      Run the verification command:
      {{inputs.verification_command}}

      Requirements:
      - Use the local repository workspace.
      - Do not edit files.
      - Do not commit changes.
      - If verification fails, still return a structured report so the graph can route back to the fixer.

      Return JSON only:
      {
        "passed": true,
        "failed_command": "",
        "exit_code": 0,
        "stdout_summary": "...",
        "stderr_summary": "...",
        "failure_summary": "",
        "evidence": "..."
      }
    execution:
      workspace_access: read
      timeout_ms: 1200000

  - id: review_code_quality
    type: execute
    backend: claude
    promptTemplate: |
      Review the latest VG-M1-014 changes for code quality only.

      Scope:
      {{inputs.task_scope}}

      Latest implementation output:
      {{nodes.implement_terminal_slice.stdout}}

      Verification report:
      {{nodes.verify_terminal_slice.stdout}}

      Focus:
      - minimal scope and no unrelated M1 backlog work
      - fit with existing scheduler, execute runner, server, UI, terminal-session, and Tauri boundaries
      - maintainability, naming, type safety, and lifecycle clarity
      - macOS and Windows implications for terminal/session behavior
      - whether tests are focused and meaningful

      Do not edit files.
      Return JSON only:
      {"passed": true, "summary": "...", "issues": []}

      If there are actionable quality problems, set passed to false and list concise issues.
    execution:
      workspace_access: read
      timeout_ms: 900000

  - id: review_terminal_acceptance
    type: execute
    backend: claude
    promptTemplate: |
      Review the latest VG-M1-014 changes for terminal acceptance only.

      Acceptance document:
      {{inputs.acceptance_doc}}

      Latest implementation output:
      {{nodes.implement_terminal_slice.stdout}}

      Verification report:
      {{nodes.verify_terminal_slice.stdout}}

      Check specifically:
      - terminal view binds to a specific sessionId rather than guessing the active session
      - node activation and run history can identify the terminal session
      - input, resize, interrupt, cancellation, and cleanup target the same session
      - Codex prompt delivery does not rely on PTY keyboard input for large prompts
      - Tauri/portable-pty work is either implemented or explicitly tracked as the next remaining slice
      - transcript and reattach behavior are implemented or explicitly tracked as remaining slices
      - {{inputs.verification_command}} passes, or failures are clearly tied to the implemented slice

      Do not edit files.
      Return JSON only:
      {"passed": true, "summary": "...", "issues": [], "remaining_acceptance_gaps": []}

      If acceptance is broken or insufficiently verified, set passed to false and list concise issues.
    execution:
      workspace_access: read
      timeout_ms: 900000

  - id: review_gate
    type: controller
    model: deepseek-chat
    readiness:
      mode: all_required
    inputs:
      verification_report:
        required: true
      quality_review:
        required: true
      terminal_acceptance_review:
        required: true
    outputs:
      fix_review_issues:
        description: "Verification failed, or at least one review did not pass."
      assess_remaining_terminal_work:
        description: "Verification and reviews passed; assess remaining VG-M1-014 acceptance gaps."
      end_failed:
        description: "Review loop cannot continue because fix attempts are exhausted."
    output_guards:
      fix_review_issues: "{{runtime.fixAttempts < runtime.maxFixAttempts}}"
      end_failed: "{{runtime.fixAttempts >= runtime.maxFixAttempts}}"
    promptTemplate: |
      You are the review gate for VG-M1-014.

      Verification report:
      {{nodes.verify_terminal_slice.stdout}}

      Code quality review:
      {{nodes.review_code_quality.stdout}}

      Terminal acceptance review:
      {{nodes.review_terminal_acceptance.stdout}}

      Runtime:
      - Fix attempts: {{runtime.fixAttempts}} / {{runtime.maxFixAttempts}}
      - Total steps: {{runtime.totalSteps}} / {{runtime.maxTotalSteps}}

      Rules:
      - Select assess_remaining_terminal_work only when the verification JSON reports passed=true and both reviews clearly report passed=true.
      - Select fix_review_issues if verification reports passed=false, either review is missing or unclear, or either review reports passed=false.
      - Select end_failed only when fixes are exhausted.

      Output JSON only:
      {
        "selected_output": "assess_remaining_terminal_work",
        "reason": "Verification and both reviews passed.",
        "confidence": 0.9,
        "payload": {
          "verification_passed": true,
          "quality_review_passed": true,
          "terminal_acceptance_review_passed": true,
          "issues_to_fix": []
        }
      }
    limits:
      min_confidence: 0.7

  - id: fix_review_issues
    type: execute
    backend: codex
    promptTemplate: |
      Fix only the VG-M1-014 issues reported by verification and review.

      Verification:
      {{nodes.verify_terminal_slice.stdout}}

      Code quality review:
      {{nodes.review_code_quality.stdout}}

      Terminal acceptance review:
      {{nodes.review_terminal_acceptance.stdout}}

      Review gate decision:
      {{nodes.review_gate.reason}}
      {{nodes.review_gate.payload.issues_to_fix}}

      Instructions:
      - Address only actionable review or verification findings.
      - Keep the scope inside VG-M1-014.
      - Preserve already-correct behavior.
      - Add or update focused tests for any behavior fix.
      - Run targeted verification, and run {{inputs.verification_command}} when practical.
      - Do not commit changes.
    execution:
      model: gpt-5.5
      reasoning_effort: high
      workspace_access: write
      timeout_ms: 1200000

  - id: assess_remaining_terminal_work
    type: execute
    backend: claude
    promptTemplate: |
      Assess whether VG-M1-014 still has remaining terminal acceptance work after the latest accepted slice.

      Scope:
      {{inputs.task_scope}}

      Acceptance document:
      {{inputs.acceptance_doc}}

      Latest implementation:
      {{nodes.implement_terminal_slice.stdout}}

      Verification report:
      {{nodes.verify_terminal_slice.stdout}}

      Accepted reviews:
      Quality: {{nodes.review_code_quality.stdout}}
      Terminal acceptance: {{nodes.review_terminal_acceptance.stdout}}

      Inspect the current code and docs. Do not edit files.
      Return JSON only:
      {"remaining_tasks": true, "next_task": "...", "reason": "..."}

      Set remaining_tasks=false only when VG-M1-014 has no meaningful remaining acceptance gap.
    execution:
      workspace_access: read
      timeout_ms: 900000

  - id: task_gate
    type: controller
    model: deepseek-chat
    readiness:
      mode: all_required
    inputs:
      terminal_assessment:
        required: true
    outputs:
      next_task:
        description: "More VG-M1-014 work remains; loop back to implementation."
      end_success:
        description: "VG-M1-014 has no remaining acceptance gaps."
      end_failed:
        description: "Task loop cannot continue before max step exhaustion."
    output_guards:
      next_task: "{{runtime.totalSteps < runtime.maxTotalSteps}}"
    promptTemplate: |
      You are the VG-M1-014 completion gate.

      Terminal assessment output:
      {{nodes.assess_remaining_terminal_work.stdout}}

      Runtime:
      - Total steps: {{runtime.totalSteps}} / {{runtime.maxTotalSteps}}

      Rules:
      - Select next_task if remaining_tasks=true and next_task is concrete.
      - Select end_success if remaining_tasks=false.
      - Select end_failed if the assessment is unusable or the loop cannot continue.

      Output JSON only:
      {
        "selected_output": "next_task",
        "reason": "A remaining VG-M1-014 task was identified.",
        "confidence": 0.9,
        "payload": {
          "next_task": "..."
        }
      }
    limits:
      min_confidence: 0.7

  - id: end_success
    type: execute
    backend: internal
    command:
      program: internal
      args: ["finish_success"]

  - id: end_failed
    type: execute
    backend: internal
    command:
      program: internal
      args: ["finish_failed"]

edges:
  - from: graph.start
    to: implement_terminal_slice.inputs.trigger

  - from: implement_terminal_slice.outputs.done
    to: verify_terminal_slice.inputs.trigger

  - from: verify_terminal_slice.outputs.done
    to: review_code_quality.inputs.trigger

  - from: verify_terminal_slice.outputs.done
    to: review_terminal_acceptance.inputs.trigger

  - from: verify_terminal_slice.outputs.done
    to: review_gate.inputs.verification_report

  - from: review_code_quality.outputs.done
    to: review_gate.inputs.quality_review

  - from: review_terminal_acceptance.outputs.done
    to: review_gate.inputs.terminal_acceptance_review

  - from: review_gate.outputs.fix_review_issues
    to: fix_review_issues.inputs.trigger

  - from: fix_review_issues.outputs.done
    to: verify_terminal_slice.inputs.trigger

  - from: review_gate.outputs.assess_remaining_terminal_work
    to: assess_remaining_terminal_work.inputs.trigger

  - from: assess_remaining_terminal_work.outputs.done
    to: task_gate.inputs.terminal_assessment

  - from: task_gate.outputs.next_task
    to: implement_terminal_slice.inputs.trigger

  - from: task_gate.outputs.end_success
    to: end_success.inputs.trigger

  - from: task_gate.outputs.end_failed
    to: end_failed.inputs.trigger

  - from: review_gate.outputs.end_failed
    to: end_failed.inputs.trigger
