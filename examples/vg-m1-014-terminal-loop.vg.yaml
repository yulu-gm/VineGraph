id: vg_m1_014_terminal_loop
version: "0.1.0"

inputs:
  task_scope:
    type: string
    default: "只完成 VG-M1-014：VineGraph M1 的 session-bound Terminal architecture。不要实现其他 M1 backlog 项。"
  verification_command:
    type: string
    default: "npm run typecheck && npm test"
  acceptance_doc:
    type: string
    default: "docs/m1-terminal-completion.md"

runtime:
  max_fix_attempts: 16
  max_total_steps: 80
  workspace:
    mode: worktree

nodes:
  - id: implement_terminal_slice
    type: execute
    backend: codex
    promptTemplate: |
      你正在实现下一个最小的 VG-M1-014 Terminal 切片。

      范围：
      {{inputs.task_scope}}

      上一次 terminal 任务决策（如果有）：
      {{nodes.task_gate.payload.next_task}}

      编辑前必须检查的事实来源文件：
      - docs/backlog.md
      - docs/progress.md
      - {{inputs.acceptance_doc}}
      - src/types.ts
      - src/scheduler.ts
      - src/execute-runner.ts
      - src/server.ts
      - src/ui/app.js
      - src/terminal-session.ts
      - src-tauri/
      - tests/

      VG-M1-014 验收切片：
      - terminal session id 连接节点 activation、run event、server action 和 UI terminal 状态
      - Codex terminal 模式的 prompt 使用可靠的 stdin，不能通过 PTY 键盘输入来键入
      - Tauri 桌面端可以支持 Rust portable-pty session manager
      - UI 可以通过 sessionId attach 或 reattach，并接收有界快照和实时输出
      - terminal transcript 被持久化，或与 run history 关联
      - interrupt、kill、resize、completion、cancellation 和 app cleanup 使用同一个 session 生命周期模型
      - 当 Tauri portable-pty 不可用时，browser/dev fallback 保持明确

      硬性边界：
      - 不要处理 VG-M1-002 到 VG-M1-013，除非 VG-M1-014 严格需要一个很小的支撑性变更。
      - 每次实现只选择一个小而可测试的 terminal 切片。
      - 保留现有测试和产品行为。
      - 对任何行为变化添加或更新聚焦测试。
      - 运行针对性验证，并在可行时运行 {{inputs.verification_command}}。
      - 不要提交变更。

      最终回复必须以下列内容结尾：
      TASK_STATUS:
      task_summary: <一句话总结已完成的 terminal 切片>
      files_changed: <变更的路径>
      tests_run: <执行的命令和观察到的结果>
      remaining_terminal_task_hint: <下一个 VG-M1-014 切片，或 none>
    execution:
      model: gpt-5.5
      reasoning_effort: high
      workspace_access: write
      timeout_ms: 1200000

  - id: verify_terminal_slice
    type: execute
    backend: claude
    promptTemplate: |
      验证最新的 VG-M1-014 terminal 切片。

      范围：
      {{inputs.task_scope}}

      最新实现输出：
      {{nodes.implement_terminal_slice.stdout}}

      运行验证命令：
      {{inputs.verification_command}}

      要求：
      - 使用本地仓库 workspace。
      - 不要编辑文件。
      - 不要提交变更。
      - 如果验证失败，仍然返回结构化报告，以便 graph 可以路由回 fixer。

      只返回 JSON：
      {
        "passed": true,
        "failed_command": "",
        "exit_code": 0,
        "stdout_summary": "...",
        "stderr_summary": "...",
        "failure_summary": "",
        "evidence": "..."
      }
    execution:
      workspace_access: read
      timeout_ms: 1200000

  - id: review_code_quality
    type: execute
    backend: claude
    promptTemplate: |
      只从代码质量角度审查最新的 VG-M1-014 变更。

      范围：
      {{inputs.task_scope}}

      最新实现输出：
      {{nodes.implement_terminal_slice.stdout}}

      验证报告：
      {{nodes.verify_terminal_slice.stdout}}

      关注点：
      - 范围最小，且没有无关的 M1 backlog 工作
      - 是否契合现有 scheduler、execute runner、server、UI、terminal-session 和 Tauri 边界
      - 可维护性、命名、类型安全和生命周期清晰度
      - terminal/session 行为对 macOS 和 Windows 的影响
      - 测试是否聚焦且有意义

      不要编辑文件。
      只返回 JSON：
      {"passed": true, "summary": "...", "issues": []}

      如果存在可执行的质量问题，将 passed 设为 false，并简要列出问题。
    execution:
      workspace_access: read
      timeout_ms: 900000

  - id: review_terminal_acceptance
    type: execute
    backend: claude
    promptTemplate: |
      只从 terminal 验收角度审查最新的 VG-M1-014 变更。

      验收文档：
      {{inputs.acceptance_doc}}

      最新实现输出：
      {{nodes.implement_terminal_slice.stdout}}

      验证报告：
      {{nodes.verify_terminal_slice.stdout}}

      具体检查：
      - terminal view 绑定到具体 sessionId，而不是猜测 active session
      - node activation 和 run history 能识别 terminal session
      - input、resize、interrupt、cancellation 和 cleanup 指向同一个 session
      - Codex prompt delivery 对大型 prompt 不依赖 PTY 键盘输入
      - Tauri/portable-pty 工作已实现，或被明确跟踪为下一个剩余切片
      - transcript 和 reattach 行为已实现，或被明确跟踪为剩余切片
      - {{inputs.verification_command}} 通过，或失败明确关联到已实现的切片

      不要编辑文件。
      只返回 JSON：
      {"passed": true, "summary": "...", "issues": [], "remaining_acceptance_gaps": []}

      如果验收破损或验证不足，将 passed 设为 false，并简要列出问题。
    execution:
      workspace_access: read
      timeout_ms: 900000

  - id: review_gate
    type: controller
    model: deepseek-chat
    readiness:
      mode: all_required
    inputs:
      verification_report:
        required: true
      quality_review:
        required: true
      terminal_acceptance_review:
        required: true
    outputs:
      fix_review_issues:
        description: "Verification failed, or at least one review did not pass."
      assess_remaining_terminal_work:
        description: "Verification and reviews passed; assess remaining VG-M1-014 acceptance gaps."
      end_failed:
        description: "Review loop cannot continue because fix attempts are exhausted."
    output_guards:
      fix_review_issues: "{{runtime.fixAttempts < runtime.maxFixAttempts}}"
      end_failed: "{{runtime.fixAttempts >= runtime.maxFixAttempts}}"
    promptTemplate: |
      你是 VG-M1-014 的 review gate。

      验证报告：
      {{nodes.verify_terminal_slice.stdout}}

      代码质量审查：
      {{nodes.review_code_quality.stdout}}

      Terminal 验收审查：
      {{nodes.review_terminal_acceptance.stdout}}

      运行时：
      - 修复尝试次数：{{runtime.fixAttempts}} / {{runtime.maxFixAttempts}}
      - 总步数：{{runtime.totalSteps}} / {{runtime.maxTotalSteps}}

      规则：
      - 只有当验证 JSON 报告 passed=true，且两个审查都明确报告 passed=true 时，才选择 assess_remaining_terminal_work。
      - 如果验证报告 passed=false、任一审查缺失或不清晰，或任一审查报告 passed=false，请选择 fix_review_issues。
      - 只有当修复次数已经耗尽时，才选择 end_failed。

      只返回 JSON：
      {
        "selected_output": "assess_remaining_terminal_work",
        "reason": "验证和两个审查都已通过。",
        "confidence": 0.9,
        "payload": {
          "verification_passed": true,
          "quality_review_passed": true,
          "terminal_acceptance_review_passed": true,
          "issues_to_fix": []
        }
      }
    limits:
      min_confidence: 0.7

  - id: fix_review_issues
    type: execute
    backend: codex
    promptTemplate: |
      只修复验证和审查报告的 VG-M1-014 问题。

      验证：
      {{nodes.verify_terminal_slice.stdout}}

      代码质量审查：
      {{nodes.review_code_quality.stdout}}

      Terminal 验收审查：
      {{nodes.review_terminal_acceptance.stdout}}

      审查关口决策：
      {{nodes.review_gate.reason}}
      {{nodes.review_gate.payload.issues_to_fix}}

      指令：
      - 只处理可执行的审查或验证发现。
      - 将范围保持在 VG-M1-014 内。
      - 保留已经正确的行为。
      - 对任何行为修复添加或更新聚焦测试。
      - 运行针对性验证，并在可行时运行 {{inputs.verification_command}}。
      - 不要提交变更。
    execution:
      model: gpt-5.5
      reasoning_effort: high
      workspace_access: write
      timeout_ms: 1200000

  - id: assess_remaining_terminal_work
    type: execute
    backend: claude
    promptTemplate: |
      评估在最新已接受切片之后，VG-M1-014 是否仍有剩余 terminal 验收工作。

      范围：
      {{inputs.task_scope}}

      验收文档：
      {{inputs.acceptance_doc}}

      最新实现：
      {{nodes.implement_terminal_slice.stdout}}

      验证报告：
      {{nodes.verify_terminal_slice.stdout}}

      已接受的审查：
      质量：{{nodes.review_code_quality.stdout}}
      Terminal 验收：{{nodes.review_terminal_acceptance.stdout}}

      检查当前代码和文档。不要编辑文件。
      只返回 JSON：
      {"remaining_tasks": true, "next_task": "...", "reason": "..."}

      只有当 VG-M1-014 没有有意义的剩余验收缺口时，才设置 remaining_tasks=false。
    execution:
      workspace_access: read
      timeout_ms: 900000

  - id: task_gate
    type: controller
    model: deepseek-chat
    readiness:
      mode: all_required
    inputs:
      terminal_assessment:
        required: true
    outputs:
      next_task:
        description: "More VG-M1-014 work remains; loop back to implementation."
      end_success:
        description: "VG-M1-014 has no remaining acceptance gaps."
      end_failed:
        description: "Task loop cannot continue before max step exhaustion."
    output_guards:
      next_task: "{{runtime.totalSteps < runtime.maxTotalSteps}}"
    promptTemplate: |
      你是 VG-M1-014 的完成 gate。

      Terminal 评估输出：
      {{nodes.assess_remaining_terminal_work.stdout}}

      运行时：
      - 总步数：{{runtime.totalSteps}} / {{runtime.maxTotalSteps}}

      规则：
      - 如果 remaining_tasks=true 且 next_task 具体明确，请选择 next_task。
      - 如果 remaining_tasks=false，请选择 end_success。
      - 如果评估不可用或循环无法继续，请选择 end_failed。

      只返回 JSON：
      {
        "selected_output": "next_task",
        "reason": "已识别出一个剩余 VG-M1-014 任务。",
        "confidence": 0.9,
        "payload": {
          "next_task": "..."
        }
      }
    limits:
      min_confidence: 0.7

  - id: end_success
    type: execute
    backend: internal
    command:
      program: internal
      args: ["finish_success"]

  - id: end_failed
    type: execute
    backend: internal
    command:
      program: internal
      args: ["finish_failed"]

edges:
  - from: graph.start
    to: implement_terminal_slice.inputs.trigger

  - from: implement_terminal_slice.outputs.done
    to: verify_terminal_slice.inputs.trigger

  - from: verify_terminal_slice.outputs.done
    to: review_code_quality.inputs.trigger

  - from: verify_terminal_slice.outputs.done
    to: review_terminal_acceptance.inputs.trigger

  - from: verify_terminal_slice.outputs.done
    to: review_gate.inputs.verification_report

  - from: review_code_quality.outputs.done
    to: review_gate.inputs.quality_review

  - from: review_terminal_acceptance.outputs.done
    to: review_gate.inputs.terminal_acceptance_review

  - from: review_gate.outputs.fix_review_issues
    to: fix_review_issues.inputs.trigger

  - from: fix_review_issues.outputs.done
    to: verify_terminal_slice.inputs.trigger

  - from: review_gate.outputs.assess_remaining_terminal_work
    to: assess_remaining_terminal_work.inputs.trigger

  - from: assess_remaining_terminal_work.outputs.done
    to: task_gate.inputs.terminal_assessment

  - from: task_gate.outputs.next_task
    to: implement_terminal_slice.inputs.trigger

  - from: task_gate.outputs.end_success
    to: end_success.inputs.trigger

  - from: task_gate.outputs.end_failed
    to: end_failed.inputs.trigger

  - from: review_gate.outputs.end_failed
    to: end_failed.inputs.trigger
