id: project_remaining_tasks_loop
version: "0.1.0"

inputs:
  task_scope:
    type: string
    default: "读取 docs/backlog.md，以 backlog 中最早仍有 Todo/In Progress 任务的阶段为当前阶段；当前阶段未清空前只实现该阶段任务。现在应优先完成 M1 剩余任务。"
  verification_command:
    type: string
    default: "npm.cmd run typecheck && npm.cmd test"

runtime:
  max_fix_attempts: 30
  max_total_steps: 120
  workspace:
    mode: worktree

nodes:
  - id: implement_feature
    type: execute
    backend: codex
    promptTemplate: |
      你正在实现 VineGraph 当前阶段的下一个 backlog 任务。

      项目目标：
      {{inputs.task_scope}}

      上一次任务决策（如果有）：
      {{nodes.task_gate.payload.next_task}}

      指令：
      - 先读取 docs/backlog.md，把它作为任务队列的唯一真值。
      - 当前阶段 = docs/backlog.md 中最早仍有 Todo 或 In Progress 且非 Deferred 任务的阶段，阶段顺序为 M1、M2、M3、M4、Cross-Cutting。
      - 当前阶段没有清空前，禁止实现后续阶段任务；例如当前阶段仍有 M1 任务时，只能实现 M1 剩余任务。
      - 每个循环只实现当前阶段里的一个 backlog 行，优先级按 P0、P1、P2，同优先级按文档顺序。
      - 如果上一次 task_gate 给出了明确 next_task，并且它仍属于当前阶段，就实现该任务；否则重新从 backlog 选择当前阶段下一个任务。
      - 不要实现 Deferred 项，除非用户明确要求。
      - 实现完成后，如确实完成了某个 backlog 行，请同步更新 docs/backlog.md 中该行状态或验收描述。
      - 复用项目现有模式，并将改动范围保持得尽量窄。
      - 遵守 AGENTS.md：不进行 TDD，不新增 Test。
      - 在可行时运行现有验证，包括 {{inputs.verification_command}}。
      - 不要提交变更。

      最终回复必须以下列内容结尾：
      TASK_STATUS:
      current_phase: <本轮阶段，例如 M1>
      backlog_task: <任务 ID 和标题>
      task_summary: <你完成的内容>
      validation_run: <执行的命令和结果>
      remaining_task_hint: <当前阶段下一个任务，或 none>
    execution:
      model: gpt-5.5
      reasoning_effort: high
      workspace_access: write
      timeout_ms: 1200000

  - id: review_code_quality
    type: execute
    backend: codex
    promptTemplate: |
      只从代码质量角度审查最新的 VineGraph 变更。

      关注点：
      - 可维护性、内聚性，以及是否符合现有架构
      - 避免过宽的重构和无关改动
      - 类型安全、错误处理和 Windows 兼容性
      - 验证证据是否足够，且是否遵守 AGENTS.md 的“不新增 Test”规则

      不要编辑文件。
      只返回 JSON：
      {"passed": true, "summary": "...", "issues": []}

      如果存在可执行的质量问题，将 passed 设为 false，并简要列出问题。
    execution:
      model: gpt-5.5
      reasoning_effort: high
      workspace_access: read
      timeout_ms: 900000

  - id: review_functionality
    type: execute
    backend: codex
    promptTemplate: |
      只从功能正确性角度审查最新的 VineGraph 变更。

      关注点：
      - 已实现的任务是否真的可用
      - 相关现有验证命令是否已运行并通过
      - graph 加载、scheduler 路由、Tauri 启动、UI 或 agent 执行是否出现回归
      - 用户可见行为是否符合项目文档

      不要编辑文件。
      只返回 JSON：
      {"passed": true, "summary": "...", "issues": []}

      如果行为已损坏或验证不足，将 passed 设为 false，并简要列出问题。
    execution:
      model: gpt-5.5
      reasoning_effort: high
      workspace_access: read
      timeout_ms: 900000

  - id: review_gate
    type: controller
    model: deepseek-chat
    readiness:
      mode: all_required
    inputs:
      quality_review:
        required: true
      functionality_review:
        required: true
    outputs:
      fix_review_issues:
        description: "At least one review did not pass; send findings to the fix node."
      assess_remaining_tasks:
        description: "Both reviews passed; assess whether more project tasks remain."
      end_failed:
        description: "Review loop cannot continue because fix attempts are exhausted."
    output_guards:
      fix_review_issues: "{{runtime.fixAttempts < runtime.maxFixAttempts}}"
      end_failed: "{{runtime.fixAttempts >= runtime.maxFixAttempts}}"
    promptTemplate: |
      你是 VineGraph 任务循环的 review gate。

      代码质量审查输出：
      {{nodes.review_code_quality.stdout}}

      功能正确性审查输出：
      {{nodes.review_functionality.stdout}}

      运行时：
      - 修复尝试次数：{{runtime.fixAttempts}} / {{runtime.maxFixAttempts}}
      - 总步数：{{runtime.totalSteps}} / {{runtime.maxTotalSteps}}

      规则：
      - 只有当两个审查都明确报告 passed=true 时，才选择 assess_remaining_tasks。
      - 如果任一审查缺失、不清晰，或报告 passed=false，请选择 fix_review_issues。
      - 只有当修复次数已经耗尽时，才选择 end_failed。

      只返回 JSON：
      {
        "selected_output": "assess_remaining_tasks",
        "reason": "两个审查都已通过。",
        "confidence": 0.9,
        "payload": {
          "quality_review_passed": true,
          "functionality_review_passed": true,
          "issues_to_fix": []
        }
      }
    limits:
      min_confidence: 0.7

  - id: fix_review_issues
    type: execute
    backend: codex
    promptTemplate: |
      修复两个审查节点报告的问题。

      代码质量审查：
      {{nodes.review_code_quality.stdout}}

      功能正确性审查：
      {{nodes.review_functionality.stdout}}

      审查关口决策：
      {{nodes.review_gate.reason}}
      {{nodes.review_gate.payload.issues_to_fix}}

      指令：
      - 只处理可执行的审查发现。
      - 保留已经正确的行为。
      - 遵守 AGENTS.md：不进行 TDD，不新增 Test。
      - 在可行时运行现有验证，包括 {{inputs.verification_command}}。
      - 不要提交变更。
    execution:
      model: gpt-5.5
      reasoning_effort: high
      workspace_access: write
      timeout_ms: 1200000

  - id: assess_remaining_tasks
    type: execute
    backend: codex
    promptTemplate: |
      评估在最新已接受任务之后，当前 backlog 阶段是否仍有剩余实现任务。

      信息来源：
      - docs/backlog.md（任务队列唯一真值，必须优先读取）
      - docs/design.md
      - README.md
      - src/
      - 当前 diff 和运行输出

      最新实现：
      {{nodes.implement_feature.stdout}}

      已接受的审查：
      质量：{{nodes.review_code_quality.stdout}}
      功能正确性：{{nodes.review_functionality.stdout}}

      不要编辑文件。
      只返回 JSON：
      {"current_phase": "M1", "remaining_tasks": true, "next_task": "VG-M1-002 Add graph asset copy API and UI", "reason": "..."}

      规则：
      - current_phase 必须是 docs/backlog.md 中最早仍有 Todo 或 In Progress 且非 Deferred 任务的阶段。
      - 如果当前阶段还有 Todo 或 In Progress 任务，remaining_tasks=true，next_task 必须是当前阶段的下一个具体 backlog 行。
      - 如果当前阶段已经没有剩余任务，但后续阶段还有任务，remaining_tasks=true，next_task 必须是下一个阶段的第一条具体 backlog 行，并在 reason 中说明阶段切换。
      - 只有当所有阶段都没有有意义的剩余 Todo/In Progress 任务时，才设置 remaining_tasks=false。
    execution:
      model: gpt-5.5
      reasoning_effort: high
      workspace_access: read
      timeout_ms: 900000

  - id: task_gate
    type: controller
    model: deepseek-chat
    readiness:
      mode: all_required
    inputs:
      task_assessment:
        required: true
    outputs:
      next_task:
        description: "More project tasks remain; loop back to implementation."
      end_success:
        description: "No remaining tasks remain in scope."
      end_failed:
        description: "Task loop cannot continue before max step exhaustion."
    output_guards:
      next_task: "{{runtime.totalSteps < runtime.maxTotalSteps}}"
    promptTemplate: |
      你是 VineGraph 任务循环的完成 gate。

      任务评估输出：
      {{nodes.assess_remaining_tasks.stdout}}

      运行时：
      - 总步数：{{runtime.totalSteps}} / {{runtime.maxTotalSteps}}

      规则：
      - 如果 remaining_tasks=true 且 next_task 是具体 backlog 任务，请选择 next_task。
      - 如果 remaining_tasks=false，请选择 end_success。
      - 如果评估不可用或循环无法继续，请选择 end_failed。

      只返回 JSON：
      {
        "selected_output": "next_task",
        "reason": "已识别出一个剩余任务。",
        "confidence": 0.9,
        "payload": {
          "current_phase": "M1",
          "next_task": "..."
        }
      }
    limits:
      min_confidence: 0.7

  - id: end_success
    type: execute
    backend: internal
    command:
      program: internal
      args: ["finish_success"]

  - id: end_failed
    type: execute
    backend: internal
    command:
      program: internal
      args: ["finish_failed"]

edges:
  - from: graph.start
    to: implement_feature.inputs.trigger

  - from: implement_feature.outputs.done
    to: review_code_quality.inputs.trigger

  - from: implement_feature.outputs.done
    to: review_functionality.inputs.trigger

  - from: review_code_quality.outputs.done
    to: review_gate.inputs.quality_review

  - from: review_functionality.outputs.done
    to: review_gate.inputs.functionality_review

  - from: review_gate.outputs.fix_review_issues
    to: fix_review_issues.inputs.trigger

  - from: fix_review_issues.outputs.done
    to: review_code_quality.inputs.trigger

  - from: fix_review_issues.outputs.done
    to: review_functionality.inputs.trigger

  - from: review_gate.outputs.assess_remaining_tasks
    to: assess_remaining_tasks.inputs.trigger

  - from: assess_remaining_tasks.outputs.done
    to: task_gate.inputs.task_assessment

  - from: task_gate.outputs.next_task
    to: implement_feature.inputs.trigger

  - from: task_gate.outputs.end_success
    to: end_success.inputs.trigger

  - from: task_gate.outputs.end_failed
    to: end_failed.inputs.trigger

  - from: review_gate.outputs.end_failed
    to: end_failed.inputs.trigger
