id: project_remaining_tasks_loop
version: "0.1.0"

inputs:
  task_scope:
    type: string
    default: "使用 docs/design.md、README.md、examples、tests 和当前代码库作为事实来源，完成 VineGraph / AgentGraph 项目的剩余实现任务。"
  verification_command:
    type: string
    default: "npm test && npm run typecheck"

runtime:
  max_fix_attempts: 30
  max_total_steps: 120
  workspace:
    mode: worktree

nodes:
  - id: implement_feature
    type: execute
    backend: codex
    promptTemplate: |
      你正在实现下一个尚未完成的 VineGraph 任务。

      项目目标：
      {{inputs.task_scope}}

      上一次任务决策（如果有）：
      {{nodes.task_gate.payload.next_task}}

      指令：
      - 只选择一个小而有价值的剩余任务。
      - 优先选择 docs/design.md、README.md、examples、tests 以及明显 runtime/UI 缺口所暗示的任务。
      - 复用项目现有模式，并将改动范围保持得尽量窄。
      - 行为发生变化时，添加或更新测试。
      - 在可行时运行相关验证，包括 {{inputs.verification_command}}。
      - 不要提交变更。

      最终回复必须以下列内容结尾：
      TASK_STATUS:
      task_summary: <你完成的内容>
      tests_run: <执行的命令和结果>
      remaining_task_hint: <下一个可能的任务，或 none>
    execution:
      model: gpt-5.5
      reasoning_effort: high
      workspace_access: write
      timeout_ms: 1200000

  - id: review_code_quality
    type: execute
    backend: codex
    promptTemplate: |
      只从代码质量角度审查最新的 VineGraph 变更。

      关注点：
      - 可维护性、内聚性，以及是否符合现有架构
      - 避免过宽的重构和无关改动
      - 类型安全、错误处理和 Windows 兼容性
      - 针对变更行为的测试质量

      不要编辑文件。
      只返回 JSON：
      {"passed": true, "summary": "...", "issues": []}

      如果存在可执行的质量问题，将 passed 设为 false，并简要列出问题。
    execution:
      model: gpt-5.5
      reasoning_effort: high
      workspace_access: read
      timeout_ms: 900000

  - id: review_functionality
    type: execute
    backend: codex
    promptTemplate: |
      只从功能正确性角度审查最新的 VineGraph 变更。

      关注点：
      - 已实现的任务是否真的可用
      - 相关命令/测试是否已运行并通过
      - graph 加载、scheduler 路由、Tauri 启动、UI 或 agent 执行是否出现回归
      - 用户可见行为是否符合项目文档

      不要编辑文件。
      只返回 JSON：
      {"passed": true, "summary": "...", "issues": []}

      如果行为已损坏或验证不足，将 passed 设为 false，并简要列出问题。
    execution:
      model: gpt-5.5
      reasoning_effort: high
      workspace_access: read
      timeout_ms: 900000

  - id: review_gate
    type: controller
    model: deepseek-chat
    readiness:
      mode: all_required
    inputs:
      quality_review:
        required: true
      functionality_review:
        required: true
    outputs:
      fix_review_issues:
        description: "At least one review did not pass; send findings to the fix node."
      assess_remaining_tasks:
        description: "Both reviews passed; assess whether more project tasks remain."
      end_failed:
        description: "Review loop cannot continue because fix attempts are exhausted."
    output_guards:
      fix_review_issues: "{{runtime.fixAttempts < runtime.maxFixAttempts}}"
      end_failed: "{{runtime.fixAttempts >= runtime.maxFixAttempts}}"
    promptTemplate: |
      你是 VineGraph 任务循环的 review gate。

      代码质量审查输出：
      {{nodes.review_code_quality.stdout}}

      功能正确性审查输出：
      {{nodes.review_functionality.stdout}}

      运行时：
      - 修复尝试次数：{{runtime.fixAttempts}} / {{runtime.maxFixAttempts}}
      - 总步数：{{runtime.totalSteps}} / {{runtime.maxTotalSteps}}

      规则：
      - 只有当两个审查都明确报告 passed=true 时，才选择 assess_remaining_tasks。
      - 如果任一审查缺失、不清晰，或报告 passed=false，请选择 fix_review_issues。
      - 只有当修复次数已经耗尽时，才选择 end_failed。

      只返回 JSON：
      {
        "selected_output": "assess_remaining_tasks",
        "reason": "两个审查都已通过。",
        "confidence": 0.9,
        "payload": {
          "quality_review_passed": true,
          "functionality_review_passed": true,
          "issues_to_fix": []
        }
      }
    limits:
      min_confidence: 0.7

  - id: fix_review_issues
    type: execute
    backend: codex
    promptTemplate: |
      修复两个审查节点报告的问题。

      代码质量审查：
      {{nodes.review_code_quality.stdout}}

      功能正确性审查：
      {{nodes.review_functionality.stdout}}

      审查关口决策：
      {{nodes.review_gate.reason}}
      {{nodes.review_gate.payload.issues_to_fix}}

      指令：
      - 只处理可执行的审查发现。
      - 保留已经正确的行为。
      - 对任何行为修复添加或更新测试。
      - 在可行时运行相关验证，包括 {{inputs.verification_command}}。
      - 不要提交变更。
    execution:
      model: gpt-5.5
      reasoning_effort: high
      workspace_access: write
      timeout_ms: 1200000

  - id: assess_remaining_tasks
    type: execute
    backend: codex
    promptTemplate: |
      评估在最新已接受任务之后，VineGraph 是否仍有剩余实现任务。

      信息来源：
      - docs/design.md
      - README.md
      - examples/
      - tests/
      - src/
      - 当前 diff 和运行输出

      最新实现：
      {{nodes.implement_feature.stdout}}

      已接受的审查：
      质量：{{nodes.review_code_quality.stdout}}
      功能正确性：{{nodes.review_functionality.stdout}}

      不要编辑文件。
      只返回 JSON：
      {"remaining_tasks": true, "next_task": "...", "reason": "..."}

      只有当项目在当前范围内没有有意义的剩余实现任务时，才设置 remaining_tasks=false。
    execution:
      model: gpt-5.5
      reasoning_effort: high
      workspace_access: read
      timeout_ms: 900000

  - id: task_gate
    type: controller
    model: deepseek-chat
    readiness:
      mode: all_required
    inputs:
      task_assessment:
        required: true
    outputs:
      next_task:
        description: "More project tasks remain; loop back to implementation."
      end_success:
        description: "No remaining tasks remain in scope."
      end_failed:
        description: "Task loop cannot continue before max step exhaustion."
    output_guards:
      next_task: "{{runtime.totalSteps < runtime.maxTotalSteps}}"
    promptTemplate: |
      你是 VineGraph 任务循环的完成 gate。

      任务评估输出：
      {{nodes.assess_remaining_tasks.stdout}}

      运行时：
      - 总步数：{{runtime.totalSteps}} / {{runtime.maxTotalSteps}}

      规则：
      - 如果 remaining_tasks=true 且 next_task 具体明确，请选择 next_task。
      - 如果 remaining_tasks=false，请选择 end_success。
      - 如果评估不可用或循环无法继续，请选择 end_failed。

      只返回 JSON：
      {
        "selected_output": "next_task",
        "reason": "已识别出一个剩余任务。",
        "confidence": 0.9,
        "payload": {
          "next_task": "..."
        }
      }
    limits:
      min_confidence: 0.7

  - id: end_success
    type: execute
    backend: internal
    command:
      program: internal
      args: ["finish_success"]

  - id: end_failed
    type: execute
    backend: internal
    command:
      program: internal
      args: ["finish_failed"]

edges:
  - from: graph.start
    to: implement_feature.inputs.trigger

  - from: implement_feature.outputs.done
    to: review_code_quality.inputs.trigger

  - from: implement_feature.outputs.done
    to: review_functionality.inputs.trigger

  - from: review_code_quality.outputs.done
    to: review_gate.inputs.quality_review

  - from: review_functionality.outputs.done
    to: review_gate.inputs.functionality_review

  - from: review_gate.outputs.fix_review_issues
    to: fix_review_issues.inputs.trigger

  - from: fix_review_issues.outputs.done
    to: review_code_quality.inputs.trigger

  - from: fix_review_issues.outputs.done
    to: review_functionality.inputs.trigger

  - from: review_gate.outputs.assess_remaining_tasks
    to: assess_remaining_tasks.inputs.trigger

  - from: assess_remaining_tasks.outputs.done
    to: task_gate.inputs.task_assessment

  - from: task_gate.outputs.next_task
    to: implement_feature.inputs.trigger

  - from: task_gate.outputs.end_success
    to: end_success.inputs.trigger

  - from: task_gate.outputs.end_failed
    to: end_failed.inputs.trigger

  - from: review_gate.outputs.end_failed
    to: end_failed.inputs.trigger
