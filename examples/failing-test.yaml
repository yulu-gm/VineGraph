id: phase1_failing_test
version: "0.1.0"

runtime:
  workspace:
    mode: local

nodes:
  - id: run_tests
    type: execute
    backend: shell
    command:
      program: cmd
      args:
        - "/c"
        - "echo Running tests... && echo TESTS FAILED! && exit 1"
    execution:
      timeoutMs: 30000

  - id: end_failed
    type: execute
    backend: internal
    command:
      program: internal
      args: ["finish_failed"]

edges:
  - from: graph.start
    to: run_tests.inputs.trigger

  - from: run_tests.outputs.done
    to: end_failed.inputs.trigger
