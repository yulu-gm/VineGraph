id: bug_fix_loop
version: "0.1.0"

inputs:
  task:
    type: string
    default: "修复失败的测试"
  test_command:
    type: string
    default: "console.log('Running tests...'); console.log('2 tests passed, 0 failed');"

runtime:
  max_fix_attempts: 3
  max_total_steps: 20
  workspace:
    mode: local

nodes:
  - id: implement
    type: execute
    backend: shell
    promptTemplate: |
      任务：{{inputs.task}}
      请实现所需的变更。
    command:
      program: node
      args:
        - "-e"
        - "console.log('Implementing changes...'); console.log('done');"
    execution:
      timeoutMs: 30000

  - id: run_tests
    type: execute
    backend: shell
    command:
      program: node
      args:
        - "-e"
        - "{{inputs.test_command}}"
    execution:
      timeoutMs: 30000

  - id: after_tests
    type: controller
    model: deepseek-chat
    readiness:
      mode: all_required
    inputs:
      test_result:
        required: true
    outputs:
      fix_from_test_logs:
        description: "Tests failed, route to fix node"
      end_success:
        description: "Tests passed, finish successfully"
      end_failed:
        description: "No fix attempts remaining"
    outputGuards:
      end_success: "{{nodes.run_tests.exitCode == 0}}"
      fix_from_test_logs: "{{nodes.run_tests.exitCode != 0 && runtime.fixAttempts < runtime.maxFixAttempts}}"
      end_failed: "{{runtime.fixAttempts >= runtime.maxFixAttempts}}"
    promptTemplate: |
      你是 bug 修复循环的 graph controller。
      请根据测试结果决定下一步。

      测试结果：
      - 退出码：{{nodes.run_tests.exitCode}}
      - 测试是否通过：{{nodes.run_tests.passed}}
      - stdout: {{nodes.run_tests.stdout}}
      - stderr: {{nodes.run_tests.stderr}}

      运行时：
      - 修复尝试次数：{{runtime.fixAttempts}} / {{runtime.maxFixAttempts}}
      - 总步数：{{runtime.totalSteps}} / {{runtime.maxTotalSteps}}

      可用输出：
      - fix_from_test_logs: 测试失败，路由到修复节点
      - end_success: 测试通过，成功结束
      - end_failed: 没有剩余修复尝试次数

      选择且只选择一个输出。只返回 JSON：
      {
        "selected_output": "end_success",
        "reason": "测试以退出码 0 通过。",
        "confidence": 0.95,
        "payload": {}
      }
    limits:
      minConfidence: 0.6

  - id: fix_from_test_logs
    type: execute
    backend: shell
    promptTemplate: |
      修复失败的测试。
      失败信息：{{nodes.run_tests.stderr}}
      上一次实现输出：{{nodes.implement.stdout}}
      修复尝试：第 {{runtime.fixAttempts}} 次，共 {{runtime.maxFixAttempts}} 次
    command:
      program: node
      args:
        - "-e"
        - "console.log('Fixing bugs...'); console.log('fixes applied');"
    execution:
      timeoutMs: 120000

  - id: end_success
    type: execute
    backend: internal
    command:
      program: internal
      args: ["finish_success"]

  - id: end_failed
    type: execute
    backend: internal
    command:
      program: internal
      args: ["finish_failed"]

edges:
  - from: graph.start
    to: implement.inputs.trigger

  - from: implement.outputs.done
    to: run_tests.inputs.trigger

  - from: run_tests.outputs.done
    to: after_tests.inputs.test_result

  - from: after_tests.outputs.fix_from_test_logs
    to: fix_from_test_logs.inputs.trigger

  - from: after_tests.outputs.end_success
    to: end_success.inputs.trigger

  - from: after_tests.outputs.end_failed
    to: end_failed.inputs.trigger

  - from: fix_from_test_logs.outputs.done
    to: run_tests.inputs.trigger
